                  deno-version: v2.8.x

            - name: Install Deno packages
              run: deno install

            - name: Run linter
              run: deno lint

            - name: Build apply
              run: deno compile --target x86_64-unknown-linux-gnu --output build/rainwall-apply-linux-x86_64 -A ./src/apply/index.ts

            - name: Build analyze
              run: deno compile --target x86_64-unknown-linux-gnu --output build/rainwall-analyze-linux-x86_64 -A ./src/analyze/index.ts

            - name: Upload build artifacts
